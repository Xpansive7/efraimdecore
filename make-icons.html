<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Gerar ícones</title></head>
<body style="background:#090907;color:#c4a44a;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
<p>Gerando ícones…</p>
<script>
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.16;
  ctx.fillStyle = '#0d0d0b';
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#c4a44a';
  ctx.font = `bold ${size*.54}px Georgia,serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('E', size/2, size*.46);
  ctx.fillRect(size*.25, size*.76, size*.5, size*.05);
  return c;
}
['192','512'].forEach(s => {
  const a = document.createElement('a');
  a.download = `icon-${s}.png`;
  a.href = makeIcon(Number(s)).toDataURL('image/png');
  a.click();
});
document.querySelector('p').textContent = 'Pronto! Dois arquivos baixados: icon-192.png e icon-512.png — coloque na pasta do projeto.';
</script>
</body></html>
